# =============================================
# SARS - Application Configuration
# =============================================

spring.application.name=sars-backend
server.port=8080

# =============================================
# DATABASE - Neon PostgreSQL
# Replace placeholders with your Neon credentials
# =============================================
spring.datasource.url=jdbc:postgresql://ep-restless-unit-an57560g-pooler.c-6.us-east-1.aws.neon.tech/neondb?sslmode=require
spring.datasource.username=neondb_owner
spring.datasource.password=npg_kzD9XMbVfpc6
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# =============================================
# JPA / HIBERNATE
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# =============================================
# JWT CONFIGURATION
# =============================================
# IMPORTANT: Replace with a strong 256-bit secret before production
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000

# =============================================
# CORS
# =============================================
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# =============================================
# FILE STORAGE (Reports)
# =============================================
app.reports.storage-path=./reports

# =============================================
# SPRINGDOC / SWAGGER
# =============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true

# =============================================
# LOGGING
# =============================================
logging.level.com.sars=INFO
logging.level.org.springframework.security=WARN
